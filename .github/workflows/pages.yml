name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployed site returns 200
        id: verify
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$url" ]; then
            echo "::error::deploy-pages did not emit a page_url output"
            exit 1
          fi
          echo "Probing $url"
          for attempt in 1 2 3 4 5; do
            # -L follows redirects (308 trailing-slash enforcement, custom-domain
            # redirects); %{url_effective} surfaces the final URL in the log so a
            # real redirect chain is debuggable without re-running locally. Any
            # 2xx counts as success.
            response=$(curl -sSL -o /dev/null -w "%{http_code} %{url_effective}" --max-time 15 "$url" || echo "000 -")
            status=$(echo "$response" | awk '{print $1}')
            final_url=$(echo "$response" | awk '{print $2}')
            echo "attempt $attempt: HTTP $status (final: $final_url)"
            case "$status" in
              2*)
                echo "::notice::Pages deploy verified ($url -> $final_url returned $status)"
                echo "page_url=$url" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
            sleep $((attempt * 5))
          done
          echo "::error::Pages deploy verification failed — $url never returned 2xx"
          exit 1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: pa11y accessibility check (WCAG2AA, error-codes handbook page)
        # Stage D minimum visual regression CI gate (F-827321-030 / D-OUT-003):
        # Run pa11y against ONE high-value reference page after the deploy has
        # been verified. WCAG2AA is the bar; we fail on errors, ignore warnings
        # and notices. Pinning is intentionally via @latest because pa11y is a
        # one-shot npx invocation here — there is no consumer in the workspace
        # that needs a lockfile entry, and adding one to root devDependencies
        # would pull a chromium-puppeteer chain into every `npm ci` for a
        # check that only ever runs in this workflow leg. If we ever sweep
        # multiple pages we'll revisit and pin via site/package-lock.json.
        run: |
          target="${{ steps.verify.outputs.page_url }}handbook/error-codes/"
          echo "pa11y target: $target"
          npx -y pa11y@^8 \
            --standard WCAG2AA \
            --reporter cli \
            --threshold 0 \
            "$target"
